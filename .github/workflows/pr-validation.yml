name: PR Validation

on:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run Biome lint check
        run: bun x biome check

      - name: Run TypeScript type check
        run: bun run typecheck

      - name: Check translation completeness
        run: bun run check-translations

      - name: Check i18n visual fit (budgeted keys)
        run: bun run check-i18n-fit --budgeted --report

      - name: Run unit tests
        run: bun test

      - name: Build extension
        run: bun run build
